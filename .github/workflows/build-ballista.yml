name: Build macOS release on tag

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Build macOS universal bundle
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ballista v__VERSION__"
          releaseBody: |
            See the assets below to download and install this macOS version.

            | File | Platform |
            |------|----------|
            | `Ballista___VERSION___universal.dmg` | macOS installer (Intel & Apple Silicon) |
            | `Ballista.app.tar.gz` | macOS app bundle (Intel & Apple Silicon) |
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
